<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#1e293b"/>
  
  <!-- Browser Window -->
  <rect x="50" y="50" width="700" height="500" rx="8" fill="#334155" stroke="#475569" stroke-width="2"/>
  
  <!-- Browser Header -->
  <rect x="50" y="50" width="700" height="40" rx="8" fill="#475569"/>
  <circle cx="80" cy="70" r="6" fill="#ef4444"/>
  <circle cx="100" cy="70" r="6" fill="#f59e0b"/>
  <circle cx="120" cy="70" r="6" fill="#10b981"/>
  
  <!-- Navigation Bar -->
  <rect x="70" y="110" width="660" height="50" rx="6" fill="#64748b"/>
  <rect x="90" y="125" width="80" height="20" rx="4" fill="#fbbf24"/>
  <rect x="190" y="125" width="60" height="20" rx="4" fill="#94a3b8"/>
  <rect x="270" y="125" width="60" height="20" rx="4" fill="#94a3b8"/>
  <rect x="350" y="125" width="60" height="20" rx="4" fill="#94a3b8"/>
  
  <!-- Hero Section -->
  <rect x="70" y="180" width="660" height="120" rx="8" fill="#7c3aed"/>
  <text x="400" y="220" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="bold">The Village For Her</text>
  <text x="400" y="250" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-size="16">Empowering Women Through Community</text>
  <rect x="320" y="260" width="160" height="30" rx="15" fill="#fbbf24"/>
  <text x="400" y="280" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Join Our Community</text>
  
  <!-- Content Grid -->
  <rect x="70" y="320" width="200" height="120" rx="6" fill="#64748b"/>
  <rect x="90" y="340" width="40" height="40" rx="20" fill="#fbbf24"/>
  <text x="190" y="360" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Community Forums</text>
  <text x="190" y="380" text-anchor="middle" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="12">Connect with others</text>
  
  <rect x="290" y="320" width="200" height="120" rx="6" fill="#64748b"/>
  <rect x="310" y="340" width="40" height="40" rx="20" fill="#fbbf24"/>
  <text x="390" y="360" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Resource Library</text>
  <text x="390" y="380" text-anchor="middle" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="12">Access helpful tools</text>
  
  <rect x="510" y="320" width="200" height="120" rx="6" fill="#64748b"/>
  <rect x="530" y="340" width="40" height="40" rx="20" fill="#fbbf24"/>
  <text x="610" y="360" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Event Management</text>
  <text x="610" y="380" text-anchor="middle" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="12">Join events & meetups</text>
  
  <!-- Footer -->
  <rect x="70" y="460" width="660" height="60" rx="6" fill="#475569"/>
  <text x="400" y="490" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12">© 2024 The Village For Her. Empowering women worldwide.</text>
  
  <!-- Decorative Elements -->
  <circle cx="150" cy="150" r="3" fill="#fbbf24" opacity="0.6"/>
  <circle cx="650" cy="200" r="4" fill="#7c3aed" opacity="0.6"/>
  <circle cx="200" cy="450" r="2" fill="#fbbf24" opacity="0.6"/>
</svg>
